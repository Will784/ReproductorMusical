<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melodía</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <h1>Melodía</h1>

    <button onclick="triggerFileInput()">Agregar canciones</button>
    <input type="file" id="fileInput" multiple accept="audio/*" hidden onchange="handleFiles(this.files)">
  </header>

  <!-- PLAYLIST -->
  <main class="playlist-panel">

    <div class="playlist-header">
      <h2>Lista</h2>

      <!-- BUSCADOR -->
      <input type="text"
             id="searchInput"
             placeholder="Buscar canción..."
             oninput="filterSongs(this.value)">
    </div>

    <div id="playlistContainer">
      <p id="emptyState">No hay canciones</p>
    </div>

  </main>

  <!-- PLAYER -->
  <aside class="player-panel">
    <h3 id="nowTitle">Sin reproducción</h3>

    <button onclick="prevSong()">⏮</button>
    <button onclick="togglePlay()" id="playBtn">▶</button>
    <button onclick="nextSong()">⏭</button>
  </aside>

</div>

<script src="script.js"></script>
</body>
</html>
