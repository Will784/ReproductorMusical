<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melodía — Reproductor</title>

 
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">


  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="app dynamic-bg">

    
    <header class="header" role="banner">
      <div class="logo" aria-label="Aplicación Melodía">
        Melodía<span class="logo-dot">.</span>
      </div>

      <div class="upload-zone" role="group" aria-label="Carga de música">
        <span class="queue-count" id="queueCount" aria-live="polite">
          0 canciones
        </span>

        <button class="btn-upload"
                onclick="triggerFileInput()"
                aria-label="Agregar canciones">
          ⬆ Agregar canción
        </button>

        <button class="btn-upload primary-btn"
                onclick="triggerFolderInput()"
                aria-label="Cargar carpeta completa">
          📁 Cargar carpeta
        </button>
      </div>

      <input type="file" id="fileInput" accept="audio/*" multiple hidden onchange="handleFiles(this.files)">
      <input type="file" id="folderInput" accept="audio/*" multiple webkitdirectory hidden onchange="handleFiles(this.files)">
    </header>

  
    <main class="playlist-panel" id="playlistPanel" role="main">
      <div class="playlist-header">
        <h2>Lista de reproducción</h2>
      </div>

      <section id="playlistContainer" aria-live="polite">
        <div class="playlist-empty" id="emptyState">
          <div class="playlist-empty-icon">♪</div>
          <div>
            <strong>Sin canciones aún</strong><br>
            Agrega archivos de audio para comenzar
          </div>
        </div>
      </section>
    </main>

  
    <aside class="player-panel" role="complementary">

      <span class="now-playing-label">Reproduciendo ahora</span>

      <div class="artwork-container" aria-label="Carátula del álbum">
        <div class="artwork-ring" id="artworkRing"></div>

        <div class="artwork-circle no-cover" id="artworkCircle">
          <div class="vinyl-hole"></div>
          <span id="artworkEmoji">🎵</span>
        </div>
      </div>

  
      <div class="song-meta">
        <div class="now-title" id="nowTitle">Sin reproducción</div>
        <div class="now-artist" id="nowArtist">—</div>
      </div>

      
      <div class="visualizer-wrap">
        <canvas id="visualizer" aria-label="Visualizador de audio"></canvas>
      </div>

  
      <div class="progress-section">
        <div class="progress-bar-wrap"
             id="progressWrap"
             onclick="seekAudio(event)"
             role="slider"
             aria-valuemin="0"
             aria-valuemax="100">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>

        <div class="time-row">
          <span id="timeElapsed">0:00</span>
          <span id="timeDuration">0:00</span>
        </div>
      </div>

   
      <div class="controls" role="group" aria-label="Controles de reproducción">

        <button class="skip-btn" onclick="skipBackward()" aria-label="Retroceder 5 segundos">
          ⏪ 5
        </button>

        <button class="ctrl-btn" onclick="prevSong()" aria-label="Canción anterior">
          ⏮
        </button>

        <button class="ctrl-btn play-btn"
                id="playBtn"
                onclick="togglePlay()"
                aria-label="Reproducir o pausar">
          ▶
        </button>

        <button class="ctrl-btn" onclick="nextSong()" aria-label="Siguiente canción">
          ⏭
        </button>

        <button class="skip-btn" onclick="skipForward()" aria-label="Avanzar 5 segundos">
          5 ⏩
        </button>

      </div>

     
      <div class="volume-row">
        <label for="volSlider" class="visually-hidden">Volumen</label>

        <input type="range"
               class="vol-slider"
               id="volSlider"
               min="0"
               max="1"
               step="0.01"
               value="0.8"
               oninput="setVolume(this.value)">
      </div>

    </aside>

    <div class="transport-bar"></div>

  </div>

  <div class="modal-overlay" id="posModal" role="dialog" aria-modal="true">
    <div class="modal">
      <h3>Insertar en posición</h3>

      <p>Posición (1 = inicio)</p>

      <input type="number" id="posInput" min="1" value="1">

      <div class="modal-btns">
        <button onclick="closeModal()">Cancelar</button>
        <button onclick="confirmInsert()">Insertar</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" aria-live="assertive"></div>

  <script src="script.js" defer></script>
</body>
</html>
